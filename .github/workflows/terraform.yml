name: Build browNet EXE
on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Installer Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Installer toutes les dépendances
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller PyQt6 PyQt6-WebEngine qasync fastapi uvicorn aiohttp aiosqlite beautifulsoup4 lxml tldextract aiohttp_socks scikit-learn numpy joblib nltk language_tool_python aiofiles requests cachetools google-re2 python-magic

    - name: Télécharger les données NLTK
      run: |
        python -c "import nltk; nltk.download('punkt'); nltk.download('stopwords'); nltk.download('punkt_tab')"

    - name: Générer l'EXE (Version IA Blindée)
      run: |
        python -m PyInstaller --onefile --noconsole --clean --collect-submodules sklearn --add-data "index.html;." --name "browNet" app.py

    - name: Télécharger le logiciel fini
      uses: actions/upload-artifact@v4
      with:
        name: logiciel-browNet-IA
        path: dist/*.exe
