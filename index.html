<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.9">
    <title>browNet - Moteur de Recherche Souverain</title>
    <meta name="description" content="browNet : Votre internet, réinventé. Moteur de recherche natif, navigation anonyme.">
    <meta name="author" content="browNet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ==========================================================================
           STYLES ORIGINAUX CONSERVÉS - ADAPTATION POUR UN DESIGN CYBER-ÉLÉGANCE
           Thème : Obsidienne et Violet Royal (#000000, violets profonds, gris acier)
           ========================================================================== */

        /* ----- VARIABLES : PALETTE OBSIDIENNE & VIOLET ROYAL ----- */
        :root {
            --bg-primary: #000000;
            --bg-secondary: #0b0710;
            --bg-tertiary: #130e1c;
            --surface: #1e1730;
            --surface-light: #2a1f42;
            --text-primary: #ffffff;
            --text-secondary: #cbd5e0;
            --text-tertiary: #8f9bb3;
            --accent: #8a6de9;
            --accent-light: #a58af0;
            --accent-dark: #6f4fd1;
            --border: rgba(138, 109, 233, 0.25);
            --border-hover: rgba(138, 109, 233, 0.6);
            --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.6);
            --shadow-md: 0 10px 15px -3px rgba(0, 0, 0, 0.7);
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.8);
            --shadow-xl: 0 25px 50px -12px rgba(0, 0, 0, 0.9);
            --transition-default: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: background-color 0.5s ease, background-image 0.5s ease;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ===== BARRE D'ONGLETS ===== */
        .tab-container {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 0 16px;
        }

        .tab-bar {
            display: flex;
            align-items: center;
            gap: 2px;
            overflow-x: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--accent) var(--bg-tertiary);
            height: 40px;
        }

        .tab-bar::-webkit-scrollbar {
            height: 2px;
        }

        .tab-bar::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 4px;
        }

        .tab {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0 16px;
            height: 34px;
            background: var(--bg-tertiary);
            border-radius: 8px 8px 0 0;
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            min-width: 130px;
            max-width: 180px;
            transition: var(--transition-default);
            border: 1px solid transparent;
            border-bottom: none;
            position: relative;
            letter-spacing: 0.02em;
        }

        .tab:hover {
            background: var(--surface);
            color: var(--text-primary);
            border-color: var(--border);
        }

        .tab.active {
            background: var(--bg-primary);
            color: var(--text-primary);
            border-color: var(--border);
            border-bottom-color: var(--bg-primary);
        }

        .tab.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--accent);
            border-radius: 2px 2px 0 0;
        }

        .tab-title {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .tab-close {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            opacity: 0.6;
            transition: var(--transition-default);
        }

        .tab-close:hover {
            background: #d14b4b;
            color: white;
            opacity: 1;
        }

        .new-tab {
            width: 30px;
            height: 30px;
            border: none;
            background: transparent;
            border-radius: 50%;
            color: var(--text-secondary);
            font-size: 20px;
            font-weight: 300;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition-default);
        }

        .new-tab:hover {
            background: var(--bg-tertiary);
            color: var(--accent);
        }

        /* ===== BARRE DE NAVIGATION ===== */
        .nav-bar {
            display: flex;
            align-items: center;
            padding: 8px 20px;
            gap: 12px;
            background: var(--bg-primary);
            border-bottom: 1px solid var(--border);
        }

        /* Logo iceberg seul */
        .iceberg-logo {
            width: 32px;
            height: 32px;
            margin-right: 4px;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .iceberg-logo:hover {
            transform: scale(1.05);
        }

        .iceberg-logo svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 4px 12px rgba(138, 109, 233, 0.4));
        }

        .nav-button {
            width: 34px;
            height: 34px;
            border: none;
            background: transparent;
            border-radius: 50%;
            font-size: 16px;
            cursor: pointer;
            color: var(--text-secondary);
            transition: var(--transition-default);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-button:hover:not(:disabled) {
            background: var(--bg-tertiary);
            color: var(--accent);
        }

        .nav-button:disabled {
            opacity: 0.2;
            cursor: not-allowed;
        }

        .url-bar {
            flex: 1;
            display: flex;
            align-items: center;
            background: var(--bg-secondary);
            border-radius: 30px;
            padding: 10px 20px;
            transition: var(--transition-default);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
        }

        .url-bar:hover,
        .url-bar:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(138, 109, 233, 0.15);
            background: var(--bg-tertiary);
        }

        .url-bar input {
            flex: 1;
            border: none;
            background: transparent;
            outline: none;
            font-size: 14px;
            font-weight: 400;
            color: var(--text-primary);
            letter-spacing: 0.01em;
        }

        .url-bar input::placeholder {
            color: var(--text-tertiary);
            font-weight: 300;
        }

        /* ===== BOUTON VPN ===== */
        .vpn-button {
            width: 70px;
            height: 36px;
            border: none;
            background: var(--bg-tertiary);
            border-radius: 30px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition-default);
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.3px;
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }

        .vpn-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(138, 109, 233, 0.1), transparent);
            transition: left 0.5s ease;
        }

        .vpn-button:hover {
            border-color: var(--accent);
            color: var(--accent-light);
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }

        .vpn-button:hover::before {
            left: 100%;
        }

        .vpn-button.active {
            background: var(--accent-dark);
            border-color: var(--accent);
            color: white;
        }

        /* ===== BOUTON PERSONNALISATION ===== */
        .customize-button {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 48px;
            height: 48px;
            border: none;
            background: var(--bg-tertiary);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition-default);
            color: var(--text-secondary);
            font-size: 18px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-md);
            z-index: 1000;
            backdrop-filter: blur(10px);
            background: rgba(19, 14, 28, 0.8);
        }

        .customize-button:hover {
            border-color: var(--accent);
            color: var(--accent-light);
            transform: rotate(90deg);
            box-shadow: var(--shadow-lg);
        }

        /* ===== MENU VPN ===== */
        .vpn-menu {
            position: absolute;
            top: 110px;
            right: 170px;
            background: rgba(11, 7, 16, 0.85);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 24px;
            width: 340px;
            display: none;
            z-index: 1000;
            box-shadow: var(--shadow-xl);
            backdrop-filter: blur(20px);
            transform: scale(0.95) translateY(-10px);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.3, 1.1);
        }

        .vpn-menu.active {
            display: block;
            transform: scale(1) translateY(0);
            opacity: 1;
        }

        /* Sélecteur de pays */
        .country-section {
            margin-bottom: 24px;
        }

        .section-label {
            font-size: 11px;
            color: var(--text-tertiary);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            font-weight: 500;
        }

        .country-select {
            width: 100%;
            padding: 16px 20px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 16px;
            color: var(--text-primary);
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            outline: none;
            transition: var(--transition-default);
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%238a6de9'%3e%3cpath d='M7 10l5 5 5-5z'/%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 20px center;
            background-size: 18px;
        }

        .country-select:hover {
            border-color: var(--accent);
            background: var(--surface);
        }

        .country-select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(138, 109, 233, 0.2);
        }

        .country-select option {
            background: var(--bg-secondary);
            color: var(--text-primary);
            padding: 12px;
        }

        /* Bouton d'action */
        .vpn-action {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 60px;
            background: var(--accent);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition-default);
            letter-spacing: 0.5px;
            box-shadow: 0 10px 20px -5px rgba(138, 109, 233, 0.4);
            position: relative;
            overflow: hidden;
        }

        .vpn-action::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }

        .vpn-action:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px -5px rgba(138, 109, 233, 0.6);
        }

        .vpn-action:hover::before {
            left: 100%;
        }

        /* ===== MENU PERSONNALISATION ===== */
        .customize-menu {
            position: fixed;
            bottom: 90px;
            right: 24px;
            background: rgba(11, 7, 16, 0.85);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            width: 320px;
            display: none;
            z-index: 1001;
            box-shadow: var(--shadow-xl);
            backdrop-filter: blur(20px);
            transform: translateY(20px);
            opacity: 0;
            transition: var(--transition-default);
        }

        .customize-menu.active {
            display: block;
            transform: translateY(0);
            opacity: 1;
        }

        .menu-header {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
            letter-spacing: 0.3px;
        }

        .section-title {
            font-size: 11px;
            font-weight: 500;
            color: var(--text-tertiary);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .wallpaper-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 24px;
        }

        .wallpaper-option {
            aspect-ratio: 16/9;
            border-radius: 12px;
            cursor: pointer;
            transition: var(--transition-default);
            border: 2px solid transparent;
            background-size: cover;
            background-position: center;
        }

        .wallpaper-option:hover {
            transform: scale(1.05);
            box-shadow: var(--shadow-md);
            border-color: var(--accent);
        }

        .wallpaper-option.active {
            border-color: var(--accent);
        }

        .wallpaper-option.dark { background: linear-gradient(135deg, #000000, #1a1428); }
        .wallpaper-option.blue { background: linear-gradient(135deg, #0b1020, #1a2639); }
        .wallpaper-option.purple { background: linear-gradient(135deg, #120b1f, #2a1a3a); }
        .wallpaper-option.green { background: linear-gradient(135deg, #0b1a0f, #1a2a1a); }
        .wallpaper-option.mountain { background-image: url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=400'); }
        .wallpaper-option.ocean { background-image: url('https://images.unsplash.com/photo-1505118380757-91f5f5632de0?w=400'); }
        .wallpaper-option.forest { background-image: url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=400'); }
        .wallpaper-option.city { background-image: url('https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?w=400'); }
        .wallpaper-option.space { background-image: url('https://images.unsplash.com/photo-1462331940025-496dfbfc7564?w=400'); }

        .color-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        .color-option {
            aspect-ratio: 1;
            border-radius: 12px;
            cursor: pointer;
            transition: var(--transition-default);
            border: 2px solid transparent;
        }

        .color-option:hover { transform: scale(1.05); border-color: var(--accent); }
        .color-option.active { border-color: var(--text-primary); }
        .color-option.purple { background: #8a6de9; }
        .color-option.blue { background: #3b82f6; }
        .color-option.green { background: #10b981; }
        .color-option.red { background: #ef4444; }
        .color-option.orange { background: #f97316; }
        .color-option.pink { background: #ec4899; }
        .color-option.teal { background: #14b8a6; }
        .color-option.yellow { background: #eab308; }

        /* ===== PAGE D'ACCUEIL ===== */
        .pages-container {
            flex: 1;
            position: relative;
        }

        .page {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
        }

        .page.active {
            display: flex;
        }

        .home-page {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .brand-container {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 60px;
        }

        .home-logo {
            width: 100px;
            height: 100px;
        }

        .home-logo svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 10px 20px rgba(138, 109, 233, 0.5));
        }

        .home-title {
            font-size: 80px;
            font-weight: 600;
            background: linear-gradient(135deg, #ffffff, #c7b9ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -2px;
            line-height: 1;
        }

        .search-container {
            width: 100%;
            max-width: 700px;
            padding: 0 20px;
        }

        .search-box {
            display: flex;
            align-items: center;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 60px;
            padding: 18px 30px;
            transition: var(--transition-default);
            box-shadow: var(--shadow-sm);
        }

        .search-box:hover,
        .search-box:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 6px rgba(138, 109, 233, 0.2);
            background: var(--bg-tertiary);
            transform: scale(1.02);
        }

        .search-box input {
            flex: 1;
            border: none;
            background: transparent;
            outline: none;
            font-size: 18px;
            font-weight: 300;
            color: var(--text-primary);
            letter-spacing: 0.02em;
        }

        .search-box input::placeholder {
            color: var(--text-tertiary);
            font-weight: 300;
            letter-spacing: 0.02em;
        }

        /* ===== PAGE DE RÉSULTATS (SERP) ===== */
        .serp-page {
            padding: 30px;
            overflow-y: auto;
            height: 100%;
            background: var(--bg-primary);
        }

        .serp-header {
            margin-bottom: 30px;
        }

        .serp-title {
            font-size: 40px;
            font-weight: 600;
            background: linear-gradient(135deg, #fff, #b7a4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            letter-spacing: -1px;
        }

        .serp-stats {
            color: var(--text-tertiary);
            font-size: 14px;
            letter-spacing: 0.02em;
        }

        .category-nav {
            display: flex;
            gap: 12px;
            margin: 30px 0 20px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 12px;
        }

        .category-tab {
            padding: 8px 22px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 40px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition-default);
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.02em;
        }

        .category-tab:hover {
            border-color: var(--accent);
            color: var(--text-primary);
            background: rgba(138, 109, 233, 0.05);
        }

        .category-tab.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .results-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .result-card {
            background: var(--bg-secondary);
            border-radius: 20px;
            padding: 24px;
            border-left: 4px solid var(--accent);
            cursor: pointer;
            transition: var(--transition-default);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
        }

        .result-card:hover {
            transform: translateX(8px);
            background: var(--bg-tertiary);
            border-color: var(--accent);
        }

        .result-title {
            font-size: 20px;
            font-weight: 600;
            color: var(--accent);
            margin-bottom: 6px;
            letter-spacing: -0.01em;
        }

        .result-url {
            font-size: 13px;
            color: #64b5f6;
            margin-bottom: 10px;
            font-family: monospace;
            opacity: 0.9;
        }

        .result-desc {
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 1.6;
            letter-spacing: 0.01em;
        }

        .image-card {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .result-thumb {
            width: 100px;
            height: 80px;
            object-fit: cover;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .video-card {
            display: flex;
            gap: 20px;
        }

        .video-thumb {
            width: 160px;
            height: 90px;
            background-size: cover;
            background-position: center;
            border-radius: 12px;
            position: relative;
            border: 1px solid var(--border);
        }

        .duration {
            position: absolute;
            bottom: 6px;
            right: 6px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.02em;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 50px;
        }

        .page-btn {
            padding: 8px 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 30px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition-default);
            font-size: 14px;
            font-weight: 500;
        }

        .page-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(138, 109, 233, 0.1);
        }

        /* ----- MICRO-ANIMATIONS SUPPLEMENTAIRES ----- */
        .tab, .nav-button, .vpn-button, .customize-button, .search-box, .result-card, .category-tab, .page-btn {
            will-change: transform, border-color, box-shadow;
        }

        /* ----- AUGMENTATION DE LA LISIBILITÉ ----- */
        ::selection {
            background: var(--accent);
            color: #000;
        }

        /* ----- EFFET DE VERRE supprimé sur les menus déjà en place ----- */
    </style>
</head>
<body>
    <!-- ================================ -->
    <!-- BARRE D'ONGLETS (inchangée) -->
    <!-- ================================ -->
    <div class="tab-container">
        <div class="tab-bar" id="tabBar"></div>
    </div>

    <!-- ================================ -->
    <!-- BARRE DE NAVIGATION (inchangée) -->
    <!-- ================================ -->
    <div class="nav-bar">
        <!-- Logo iceberg seul (sans texte) -->

    <script>
        // ========== CONNEXION AVEC LE MOTEUR PYTHON ==========
        // Simule l'appel au moteur de recherche Python
        // Dans un environnement réel, ceci serait remplacé par une API
        const BrowNetSearch = {
            // Simule une recherche avec le moteur Python
            async search(query, category = 'all', page = 1) {
                console.log(`🔍 Recherche browNet: "${query}" (${category})`);
                
                try {
                    // Simuler un délai réseau
                    await new Promise(r => setTimeout(r, 500));
                    
                    // Résultats simulés (remplacés par de vrais résultats via l'API)
                    const results = this.generateMockResults(query, category);
                    
                    // Afficher la page de résultats
                    this.renderResults(query, category, page, results);
                    
                } catch (error) {
                    console.error("Erreur recherche:", error);
                    this.renderError(query, error);
                }
            },
            
            // Génère des résultats simulés pour la démo
            generateMockResults(query, category) {
                const baseResults = [
                    { title: `browNet - Le navigateur souverain`, url: `brownet.net`, desc: `Découvrez browNet, le navigateur qui réinvente votre façon de naviguer. Sécurité, rapidité et indépendance.`, source: 'browNet' },
                    { title: `Communauté browNet - Forum d'entraide`, url: `community.brownet.net`, desc: `Rejoignez des milliers d'utilisateurs, posez vos questions et partagez vos découvertes sur browNet.`, source: 'browNet' },
                    { title: `Wikipédia - ${query}`, url: `wikipedia.net/wiki/${query}`, desc: `Article encyclopédique sur ${query} - Définition, histoire, concepts clés.`, source: 'Wikipédia' },
                    { title: `${query} - Actualités et informations`, url: `news.brownet.net/${query}`, desc: `Toute l'actualité sur ${query} en continu.`, source: 'browNet News' },
                    { title: `Tutoriel vidéo: ${query} pour débutants`, url: `video.brownet.net/tuto-${query}`, desc: `Apprenez les bases de ${query} en 10 minutes avec ce tutoriel vidéo.`, source: 'browNet Vidéos' },
                    { title: `Images de ${query}`, url: `images.brownet.net/${query}`, desc: `Galerie d'images haute résolution sur ${query}.`, source: 'browNet Images' },
                ];
                
                if (category === 'images') {
                    return baseResults.filter(r => r.url.includes('images')).map((r, i) => ({
                        ...r,
                        thumbnail: `https://picsum.photos/200/150?random=${i}`
                    }));
                } else if (category === 'videos') {
                    return baseResults.filter(r => r.url.includes('video')).map(r => ({
                        ...r,
                        duration: '5:30',
                        thumbnail: `https://img.youtube.com/vi/dQw4w9WgXcQ/0.jpg`
                    }));
                } else if (category === 'news') {
                    return baseResults.filter(r => r.url.includes('news')).map(r => ({
                        ...r,
                        timestamp: new Date().toISOString()
                    }));
                }
                
                return baseResults;
            },
            
            // Affiche la page de résultats
            renderResults(query, category, page, results) {
                const container = document.getElementById('pagesContainer');
                
                // Construire les onglets de catégorie
                const categories = [
                    { id: 'all', label: 'Tous', active: category === 'all' },
                    { id: 'images', label: 'Images', active: category === 'images' },
                    { id: 'videos', label: 'Vidéos', active: category === 'videos' },
                    { id: 'news', label: 'Actualités', active: category === 'news' }
                ];
                
                const tabsHtml = categories.map(c => 
                    `<button class="category-tab ${c.active ? 'active' : ''}" data-category="${c.id}">${c.label}</button>`
                ).join('');
                
                // Construire les résultats
                const resultsHtml = results.map(r => {
                    if (category === 'images' && r.thumbnail) {
                        return `
                            <div class="result-card image-card" data-url="https://${r.url}">
                                <img src="${r.thumbnail}" alt="" class="result-thumb">
                                <div class="result-info">
                                    <div class="result-title">${r.title}</div>
                                    <div class="result-url">https://${r.url}</div>
                                </div>
                            </div>
                        `;
                    } else if (category === 'videos' && r.thumbnail) {
                        return `
                            <div class="result-card video-card" data-url="https://${r.url}">
                                <div class="video-thumb" style="background-image: url('${r.thumbnail}')">
                                    <span class="duration">${r.duration || '5:30'}</span>
                                </div>
                                <div class="result-info">
                                    <div class="result-title">${r.title}</div>
                                    <div class="result-url">https://${r.url}</div>
                                    <div class="result-desc">${r.desc}</div>
                                </div>
                            </div>
                        `;
                    } else {
                        return `
                            <div class="result-card web-card" data-url="https://${r.url}">
                                <div class="result-title">${r.title}</div>
                                <div class="result-url">https://${r.url}</div>
                                <div class="result-desc">${r.desc}</div>
                            </div>
                        `;
                    }
                }).join('');
                
                // Template complet
                const html = `
                    <div class="serp-page">
                        <div class="serp-header">
                            <div class="serp-title">${query}</div>
                            <div class="serp-stats">Environ ${results.length} résultats (0.45 secondes)</div>
                        </div>
                        
                        <div class="category-nav">
                            ${tabsHtml}
                        </div>
                        
                        <div class="results-grid">
                            ${resultsHtml}
                        </div>
                        
                        <div class="pagination">
                            <button class="page-btn" data-page="1">1</button>
                            <button class="page-btn" data-page="2">2</button>
                            <button class="page-btn" data-page="3">3</button>
                            <button class="page-btn" data-page="4">4</button>
                            <button class="page-btn" data-page="5">5</button>
                        </div>
                    </div>
                `;
                
                container.innerHTML = html;
                
                // Attacher les événements
                container.querySelectorAll('.result-card').forEach(card => {
                    card.addEventListener('click', () => {
                        const url = card.dataset.url;
                        if (url && window.browser) {
                            window.browser.navigateTo(url);
                        }
                    });
                });
                
                container.querySelectorAll('.category-tab').forEach(tab => {
                    tab.addEventListener('click', () => {
                        const cat = tab.dataset.category;
                        window.browser?.search(query, cat);
                    });
                });
                
                container.querySelectorAll('.page-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const p = btn.dataset.page;
                        window.browser?.search(query, category, p);
                    });
                });
            },
            
            renderError(query, error) {
                const container = document.getElementById('pagesContainer');
                container.innerHTML = `
                    <div style="padding:40px;text-align:center;">
                        <h2 style="color:#ef4444;">Erreur de recherche</h2>
                        <p>Requête: ${query}</p>
                        <p>Erreur: ${error}</p>
                    </div>
                `;
            }
        };

        // ========== TES FONCTIONS ORIGINALES (INTÉGRALEMENT CONSERVÉES) ==========
        const elements = {
            tabBar: document.getElementById('tabBar'),
            pagesContainer: document.getElementById('pagesContainer'),
            urlInput: document.getElementById('urlInput'),
            backBtn: document.getElementById('backBtn'),
            forwardBtn: document.getElementById('forwardBtn'),
            vpnBtn: document.getElementById('vpnBtn'),
            vpnMenu: document.getElementById('vpnMenu'),
            vpnActionBtn: document.getElementById('vpnActionBtn'),
            countrySelect: document.getElementById('countrySelect'),
            customizeBtn: document.getElementById('customizeBtn'),
            customizeMenu: document.getElementById('customizeMenu'),
            wallpaperOptions: document.querySelectorAll('.wallpaper-option'),
            colorOptions: document.querySelectorAll('.color-option')
        };

        // État VPN
        let vpnActive = false;

        function updateVPNState() {
            if (vpnActive) {
                elements.vpnBtn.classList.add('active');
                elements.vpnActionBtn.textContent = 'Désactiver VPN';
            } else {
                elements.vpnBtn.classList.remove('active');
                elements.vpnActionBtn.textContent = 'Activer VPN';
            }
        }

        updateVPNState();

        // Gestion VPN
        elements.vpnBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            elements.vpnMenu.classList.toggle('active');
        });

        elements.vpnActionBtn.addEventListener('click', () => {
            vpnActive = !vpnActive;
            updateVPNState();
            elements.vpnMenu.classList.remove('active');
        });

        // Fermer les menus
        document.addEventListener('click', (e) => {
            if (!elements.vpnBtn.contains(e.target) && !elements.vpnMenu.contains(e.target)) {
                elements.vpnMenu.classList.remove('active');
            }
            if (!elements.customizeBtn.contains(e.target) && !elements.customizeMenu.contains(e.target)) {
                elements.customizeMenu.classList.remove('active');
            }
        });

        // Personnalisation
        elements.customizeBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            elements.customizeMenu.classList.toggle('active');
        });

        elements.wallpaperOptions.forEach(option => {
            option.addEventListener('click', () => {
                const fond = option.dataset.wallpaper;
                const body = document.body;
                
                const fonds = {
                    dark: () => { body.style.backgroundImage = 'none'; body.style.backgroundColor = '#000000'; },
                    blue: () => { body.style.backgroundImage = 'none'; body.style.backgroundColor = '#0b1020'; },
                    purple: () => { body.style.backgroundImage = 'none'; body.style.backgroundColor = '#120b1f'; },
                    green: () => { body.style.backgroundImage = 'none'; body.style.backgroundColor = '#0b1a0f'; },
                    mountain: () => { body.style.backgroundImage = 'url(https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1200)'; },
                    ocean: () => { body.style.backgroundImage = 'url(https://images.unsplash.com/photo-1505118380757-91f5f5632de0?w=1200)'; },
                    forest: () => { body.style.backgroundImage = 'url(https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=1200)'; },
                    city: () => { body.style.backgroundImage = 'url(https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?w=1200)'; },
                    space: () => { body.style.backgroundImage = 'url(https://images.unsplash.com/photo-1462331940025-496dfbfc7564?w=1200)'; }
                };
                
                if (fonds[fond]) fonds[fond]();
                
                elements.wallpaperOptions.forEach(opt => opt.classList.remove('active'));
                option.classList.add('active');
                elements.customizeMenu.classList.remove('active');
            });
        });

        elements.colorOptions.forEach(option => {
            option.addEventListener('click', () => {
                const couleur = option.dataset.color;
                document.documentElement.style.setProperty('--accent', couleur);
                document.documentElement.style.setProperty('--accent-light', couleur + 'dd');
                document.documentElement.style.setProperty('--accent-dark', couleur + 'aa');
                
                elements.colorOptions.forEach(opt => opt.classList.remove('active'));
                option.classList.add('active');
                elements.customizeMenu.classList.remove('active');
            });
        });

        // ========== CLASSE BROWSER AMÉLIORÉE AVEC MOTEUR DE RECHERCHE BROWNET ==========
        class Tab {
            constructor(id, title) {
                this.id = id;
                this.title = title;
                this.url = 'brownet://home';
                this.history = ['brownet://home'];
                this.historyIndex = 0;
            }
        }

        class Browser {
            constructor() {
                this.tabs = [];
                this.activeTabId = null;
                this.tabCounter = 0;
                this.init();
                window.browser = this; // Pour accès global
            }

            init() {
                this.addTab();
                this.initEvents();
            }

            initEvents() {
                elements.backBtn.addEventListener('click', () => this.goBack());
                elements.forwardBtn.addEventListener('click', () => this.goForward());

                elements.urlInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        const input = e.target.value.trim();
                        this.handleInput(input);
                    }
                });
            }

            handleInput(input) {
                if (!input) return;

                // Détecter si c'est une URL ou une recherche
                if (input.includes('.') && !input.includes(' ')) {
                    // C'est probablement une URL
                    let url = input;
                    if (!url.startsWith('http')) {
                        url = 'https://' + url;
                    }
                    this.navigateTo(url);
                } else {
                    // C'est une recherche textuelle - utiliser Google
                    this.googleSearch(input);
                }
            }

            // Nouvelle méthode : recherche via Google avec l'astuce &igu=1
            googleSearch(query) {
                if (!query) return;
                const url = `https://www.google.com/search?q=${encodeURIComponent(query)}&igu=1`;
                this.navigateTo(url);
            }

            search(query, category = 'all', page = 1) {
                const activeTab = this.tabs.find(t => t.id === this.activeTabId);
                if (!activeTab) return;

                // Utiliser le moteur de recherche browNet
                BrowNetSearch.search(query, category, page);
                
                // Mettre à jour l'URL pour l'historique
                const searchUrl = `brownet://search?q=${encodeURIComponent(query)}&cat=${category}&page=${page}`;
                
                activeTab.url = searchUrl;
                activeTab.title = `Recherche: ${query}`;
                activeTab.history = activeTab.history.slice(0, activeTab.historyIndex + 1);
                activeTab.history.push(searchUrl);
                activeTab.historyIndex++;

                elements.urlInput.value = searchUrl;
                elements.backBtn.disabled = activeTab.historyIndex === 0;
                elements.forwardBtn.disabled = activeTab.historyIndex === activeTab.history.length - 1;
                
                this.renderTabs();
            }

            navigateTo(url) {
                const activeTab = this.tabs.find(t => t.id === this.activeTabId);
                if (!activeTab) return;

                // Si c'est une recherche interne (ancien système), utiliser search()
                if (url.includes('brownet://search')) {
                    const params = new URLSearchParams(url.split('?')[1] || '');
                    const q = params.get('q');
                    const cat = params.get('cat') || 'all';
                    const page = params.get('page') || '1';
                    if (q) {
                        this.search(q, cat, parseInt(page));
                        return;
                    }
                }

                // URL normale (y compris Google)
                activeTab.url = url;
                activeTab.title = this.getTitleFromUrl(url);
                
                activeTab.history = activeTab.history.slice(0, activeTab.historyIndex + 1);
                activeTab.history.push(url);
                activeTab.historyIndex++;

                elements.urlInput.value = url;
                elements.pagesContainer.innerHTML = `<iframe src="${url}" style="width:100%;height:100%;border:none;"></iframe>`;
                
                elements.backBtn.disabled = activeTab.historyIndex === 0;
                elements.forwardBtn.disabled = activeTab.historyIndex === activeTab.history.length - 1;
                
                this.renderTabs();
            }

            addTab() {
                this.tabCounter++;
                const id = Date.now() + this.tabCounter;
                const tab = new Tab(id, `Nouvel onglet ${this.tabCounter}`);
                this.tabs.push(tab);
                this.renderTabs();
                this.setActiveTab(id);
                this.renderHomePage(id);
            }

            renderHomePage(id) {
                const active = this.tabs.find(t => t.id === id);
                if (!active) return;
                
                elements.pagesContainer.innerHTML = `
                    <div class="home-page">
                        <div class="brand-container">
                            <div class="home-logo">
                                <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M20 2L4 12V28L20 38L36 28V12L20 2Z" fill="url(#iceGradientLarge)" stroke="white" stroke-width="1.5"/>
                                    <path d="M20 2L12 12L20 22L28 12L20 2Z" fill="url(#topFacetLarge)" fill-opacity="0.6"/>
                                    <path d="M4 12L12 12L20 22L12 32L4 28V12Z" fill="url(#leftFacetLarge)" fill-opacity="0.4"/>
                                    <path d="M36 12L28 12L20 22L28 32L36 28V12Z" fill="url(#rightFacetLarge)" fill-opacity="0.4"/>
                                    <path d="M12 32L20 38L28 32L20 22L12 32Z" fill="url(#bottomFacetLarge)" fill-opacity="0.3"/>
                                    <path d="M20 2V38M4 12L36 12M4 28L36 28M12 12L28 32M28 12L12 32" stroke="white" stroke-width="1" stroke-opacity="0.3"/>
                                    <circle cx="14" cy="16" r="2.5" fill="white" fill-opacity="0.2"/>
                                    <circle cx="26" cy="24" r="2" fill="white" fill-opacity="0.15"/>
                                </svg>
                            </div>
                            <span class="home-title">browNet</span>
                        </div>
                        <div class="search-container">
                            <div class="search-box">
                                <input type="text" class="page-search" placeholder="Rechercher sur browNet...">
                            </div>
                        </div>
                    </div>
                `;
                
                const input = elements.pagesContainer.querySelector('.page-search');
                input.addEventListener('keypress', (e) => { 
                    if (e.key === 'Enter') this.handleInput(e.target.value); 
                });
            }

            closeTab(id) {
                if (this.tabs.length <= 1) return;
                
                const index = this.tabs.findIndex(t => t.id === id);
                this.tabs = this.tabs.filter(t => t.id !== id);
                
                if (this.activeTabId === id) {
                    const newActive = this.tabs[Math.min(index, this.tabs.length - 1)];
                    this.setActiveTab(newActive.id);
                    this.renderCurrentPage();
                }
                
                this.renderTabs();
            }

            setActiveTab(id) {
                this.activeTabId = id;
                const active = this.tabs.find(t => t.id === id);
                
                if (active) {
                    elements.urlInput.value = active.url;
                    elements.backBtn.disabled = active.historyIndex === 0;
                    elements.forwardBtn.disabled = active.historyIndex === active.history.length - 1;
                }
                
                this.renderTabs();
                this.renderCurrentPage();
            }

            renderCurrentPage() {
                const active = this.tabs.find(t => t.id === this.activeTabId);
                if (!active) return;

                if (active.url === 'brownet://home') {
                    this.renderHomePage(active.id);
                } else if (active.url.startsWith('brownet://search')) {
                    const params = new URLSearchParams(active.url.split('?')[1] || '');
                    const q = params.get('q');
                    const cat = params.get('cat') || 'all';
                    const page = params.get('page') || '1';
                    if (q) {
                        BrowNetSearch.search(q, cat, parseInt(page));
                    }
                } else {
                    elements.pagesContainer.innerHTML = `<iframe src="${active.url}" style="width:100%;height:100%;border:none;"></iframe>`;
                }
            }

            renderTabs() {
                elements.tabBar.innerHTML = '';
                
                this.tabs.forEach(tab => {
                    const el = document.createElement('div');
                    el.className = `tab ${tab.id === this.activeTabId ? 'active' : ''}`;
                    el.dataset.tabId = tab.id;
                    
                    el.onclick = (e) => {
                        if (!e.target.classList.contains('tab-close')) {
                            this.setActiveTab(tab.id);
                        }
                    };
                    
                    el.innerHTML = `<span class="tab-title">${tab.title}</span><span class="tab-close" data-tab-id="${tab.id}">✕</span>`;
                    
                    const close = el.querySelector('.tab-close');
                    close.onclick = (e) => { e.stopPropagation(); this.closeTab(tab.id); };
                    
                    elements.tabBar.appendChild(el);
                });
                
                const newBtn = document.createElement('button');
                newBtn.className = 'new-tab';
                newBtn.onclick = () => this.addTab();
                newBtn.innerHTML = '+';
                elements.tabBar.appendChild(newBtn);
            }

            goBack() {
                const active = this.tabs.find(t => t.id === this.activeTabId);
                if (active && active.historyIndex > 0) {
                    active.historyIndex--;
                    active.url = active.history[active.historyIndex];
                    this.renderCurrentPage();
                    this.setActiveTab(active.id);
                }
            }

            goForward() {
                const active = this.tabs.find(t => t.id === this.activeTabId);
                if (active && active.historyIndex < active.history.length - 1) {
                    active.historyIndex++;
                    active.url = active.history[active.historyIndex];
                    this.renderCurrentPage();
                    this.setActiveTab(active.id);
                }
            }

            getTitleFromUrl(url) {
                try {
                    const hostname = new URL(url).hostname;
                    return hostname.replace('www.', '');
                } catch {
                    return url;
                }
            }
        }

        // ========== INITIALISATION ==========
        new Browser();

        console.log('🚀 browNet Search est prêt ! Plus besoin de Google.');
        console.log('💡 Essayez de chercher : "browNet", "Wikipédia", "IA"...');

        // ========== AUTO-SUGGESTIONS (AJOUTÉ SANS SUPPRIMER L'EXISTANT) ==========
        // Créer le datalist pour les suggestions
        const suggestionsList = document.createElement('datalist');
        suggestionsList.id = 'suggestions';
        document.body.appendChild(suggestionsList);

        // Fonction pour récupérer les suggestions
        async function fetchSuggestions(query) {
            if (query.length < 2) {
                suggestionsList.innerHTML = '';
                return;
            }
            try {
                const response = await fetch(`http://127.0.0.1:8080/suggest?q=${encodeURIComponent(query)}`);
                const data = await response.json();
                suggestionsList.innerHTML = data.map(item => `<option value="${item.title}">${item.url}</option>`).join('');
            } catch (e) {
                console.error('Erreur de suggestion', e);
            }
        }

        // Attacher l'événement input à la barre d'URL fixe
        const urlInput = document.getElementById('urlInput');
        if (urlInput) {
            urlInput.setAttribute('list', 'suggestions');
            urlInput.addEventListener('input', (e) => fetchSuggestions(e.target.value));
        }

        // Pour le champ de recherche de la page d'accueil, on doit attendre qu'il soit créé.
        // On va surcharger la méthode renderHomePage pour y ajouter l'écouteur sans casser l'original.
        const originalRenderHomePage = Browser.prototype.renderHomePage;
        Browser.prototype.renderHomePage = function(id) {
            // Appeler l'original
            originalRenderHomePage.call(this, id);
            
            // Maintenant, l'input .page-search existe dans le DOM
            const homeInput = document.querySelector('.page-search');
            if (homeInput) {
                homeInput.setAttribute('list', 'suggestions');
                homeInput.addEventListener('input', (e) => fetchSuggestions(e.target.value));
            }
        };
    </script>
</body>
</html>
